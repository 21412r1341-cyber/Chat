<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { background: #0e0e0f; color: #e8e8ea; font-family: 'Segoe UI', sans-serif; }
    .chat-wrap { max-width: 640px; margin: 40px auto; padding: 0 16px; }
    h4 { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: #00e5a0; margin-bottom: 16px; }
    #chat-window {
      height: 420px; overflow-y: auto; background: #161618;
      border: 1px solid #2a2a2d; border-radius: 10px;
      padding: 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2a2d; border-radius: 2px; }
    .msg { background: #1c1c1f; border: 1px solid #2a2a2d; border-radius: 8px; padding: 8px 12px; font-size: 14px; animation: in 0.15s ease-out; }
    .msg.mine { background: rgba(0,229,160,0.08); border-color: rgba(0,229,160,0.2); }
    @keyframes in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .sender { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #6b6b72; margin-bottom: 3px; }
    .msg.mine .sender { color: rgba(0,229,160,0.6); }
    .send-input { background: #161618 !important; border: 1px solid #2a2a2d !important; color: #e8e8ea !important; border-radius: 8px !important; }
    .send-input:focus { border-color: rgba(0,229,160,0.4) !important; box-shadow: none !important; }
    .send-input::placeholder { color: #6b6b72 !important; }
    .send-btn { background: #00e5a0; border: none; color: #000; font-weight: 600; font-size: 13px; border-radius: 8px; padding: 10px 20px; }
    .send-btn:hover { background: #00c98d; }
    .status { font-size: 11px; color: #6b6b72; margin-bottom: 8px; }
    .status.connected { color: #00e5a0; }
    #username-display { font-size: 11px; color: #6b6b72; float: right; }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="d-flex align-items-center mb-2">
      <h4 class="mb-0">Global Chat</h4>
      <span id="username-display" class="ms-auto"></span>
    </div>
    <div class="status" id="status">Connecting…</div>
    <div id="chat-window"></div>
    <div class="d-flex gap-2">
      <input class="send-input form-control" id="msg-input" placeholder="Message…" autocomplete="off" maxlength="500">
      <button class="send-btn" id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const socket = io();
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    // Extract username from cookie/session via first received message isn't available,
    // so we display it after connection via a join event instead.
    // For now show a placeholder.
    document.getElementById('username-display').textContent = '';

    socket.on('connect', () => {
      status.textContent = '● Connected';
      status.classList.add('connected');
    });

    socket.on('disconnect', () => {
      status.textContent = 'Disconnected — reconnecting…';
      status.classList.remove('connected');
    });

    socket.on('message', (msg) => {
      const colonIdx = msg.indexOf(': ');
      const sender = colonIdx !== -1 ? msg.slice(0, colonIdx) : '';
      const text   = colonIdx !== -1 ? msg.slice(colonIdx + 2) : msg;

      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<div class="sender">${escHtml(sender)}</div><div>${escHtml(text)}</div>`;
      chatWindow.appendChild(div);

      // Trim to 100
      while (chatWindow.children.length > 100) chatWindow.removeChild(chatWindow.firstChild);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      socket.send(text);
      msgInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
