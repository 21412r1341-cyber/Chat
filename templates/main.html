<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Chat</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0e0f; color: #e8e8ea; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    .app { width: 100%; max-width: 620px; height: min(720px, 92vh); background: #161618; border: 1px solid #2a2a2d; border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
    .header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid #2a2a2d; background: #0e0e0f; flex-shrink: 0; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b6b72; transition: all 0.4s; flex-shrink: 0; }
    .live-dot.on { background: #00e5a0; box-shadow: 0 0 10px #00e5a0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .header-title { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .ai-badge { font-size: 11px; color: #a78bfa; background: rgba(167,139,250,0.1); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(167,139,250,0.25); }
    .header-user { margin-left: auto; font-size: 12px; color: #00e5a0; background: rgba(0,229,160,0.1); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(0,229,160,0.2); }
    .logout-btn { font-size: 11px; color: #6b6b72; background: rgba(255,255,255,0.04); padding: 3px 10px; border-radius: 20px; border: 1px solid #2a2a2d; text-decoration: none; transition: color 0.15s; }
    .logout-btn:hover { color: #f87171; border-color: rgba(248,113,113,0.3); }
    #chat-window { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2a2d; border-radius: 2px; }
    .msg { display: flex; gap: 10px; animation: in 0.15s ease-out; }
    .msg.mine { flex-direction: row-reverse; }
    @keyframes in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .avatar { width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-top: 2px; }
    .bubble { max-width: 75%; padding: 9px 13px; border-radius: 8px; border: 1px solid #2a2a2d; background: #1c1c1f; word-break: break-word; }
    .msg.mine .bubble { background: rgba(0,229,160,0.08); border-color: rgba(0,229,160,0.2); }
    .sender { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #6b6b72; margin-bottom: 3px; }
    .msg.mine .sender { color: rgba(0,229,160,0.6); text-align: right; }
    .text { font-size: 14px; line-height: 1.5; color: #e8e8ea; }
    .deleted { opacity: 0; transform: scale(0.95); transition: all 0.3s ease-out; pointer-events: none; }
    .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #6b6b72; font-size: 13px; }
    .input-area { padding: 14px 20px; border-top: 1px solid #2a2a2d; background: #0e0e0f; flex-shrink: 0; display: flex; gap: 10px; }
    .msg-input { flex: 1; background: #161618; border: 1px solid #2a2a2d; border-radius: 8px; padding: 10px 14px; color: #e8e8ea; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .msg-input:focus { border-color: rgba(0,229,160,0.4); }
    .msg-input::placeholder { color: #6b6b72; }
    .msg-input:disabled { opacity: 0.4; }
    .send-btn { background: #00e5a0; color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .send-btn:hover:not(:disabled) { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: #f87171; font-size: 12px; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="live-dot" id="dot"></div>
    <span class="header-title">Global Chat</span>
    <span class="ai-badge">🤖 AI Moderated</span>
    <span class="header-user">{{ username }}</span>
    <a class="logout-btn" href="/logout">Log out</a>
  </div>
  <div id="chat-window">
    <div class="empty" id="empty">No messages yet — say hello!</div>
  </div>
  <div class="input-area">
    <input class="msg-input" id="msg-input" placeholder="Message…" autocomplete="off" maxlength="500" disabled>
    <button class="send-btn" id="send-btn" disabled>Send</button>
  </div>
</div>
<div class="toast" id="toast">🤖 A message was removed by AI moderation</div>

<script>
  const ME = "{{ username }}";
  const COLORS = [
    ['rgba(0,229,160,0.12)','#00e5a0'],
    ['rgba(167,139,250,0.12)','#a78bfa'],
    ['rgba(251,191,36,0.12)','#fbbf24'],
    ['rgba(248,113,113,0.12)','#f87171'],
    ['rgba(96,165,250,0.12)','#60a5fa'],
    ['rgba(244,114,182,0.12)','#f472b6'],
  ];
  function getColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % 1000;
    return COLORS[Math.abs(h) % COLORS.length];
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  const chatWindow = document.getElementById('chat-window');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const dot = document.getElementById('dot');
  const empty = document.getElementById('empty');
  const toast = document.getElementById('toast');

  let toastTimer = null;
  function showToast() {
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  const socket = io();

  socket.on('connect', () => {
    dot.classList.add('on');
    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.focus();
  });

  socket.on('disconnect', () => {
    dot.classList.remove('on');
    msgInput.disabled = true;
    sendBtn.disabled = true;
  });

  socket.on('chat_message', ({ id, content }) => {
    if (empty && empty.parentNode) empty.remove();
    const colonIdx = content.indexOf(': ');
    const sender = colonIdx !== -1 ? content.slice(0, colonIdx) : '?';
    const text = colonIdx !== -1 ? content.slice(colonIdx + 2) : content;
    const isMe = sender === ME;
    const [bg, color] = getColor(sender);
    const initials = sender.slice(0,2).toUpperCase();
    const div = document.createElement('div');
    div.className = 'msg' + (isMe ? ' mine' : '');
    div.dataset.id = id;
    div.innerHTML = `
      <div class="avatar" style="background:${bg};color:${color}">${esc(initials)}</div>
      <div class="bubble">
        <div class="sender">${esc(sender)}</div>
        <div class="text">${esc(text)}</div>
      </div>`;
    chatWindow.appendChild(div);
    while (chatWindow.querySelectorAll('.msg').length > 100) chatWindow.querySelector('.msg').remove();
    chatWindow.scrollTop = chatWindow.scrollHeight;
  });

  socket.on('delete_messages', (ids) => {
    if (ids === 'all') {
      chatWindow.innerHTML = '<div class="empty">Chat was cleared.</div>';
      return;
    }
    let removed = 0;
    ids.forEach(id => {
      const el = chatWindow.querySelector(`[data-id="${id}"]`);
      if (el) {
        el.classList.add('deleted');
        setTimeout(() => el.remove(), 300);
        removed++;
      }
    });
    if (removed > 0) showToast();
  });

  function sendMsg() {
    const text = msgInput.value.trim();
    if (!text) return;
    socket.send(text);
    msgInput.value = '';
  }

  sendBtn.addEventListener('click', sendMsg);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
