<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoolChat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0b;--surface:#111113;--surface2:#161618;--border:#1e1e22;
  --accent:#00ff88;--accent2:#7c3aed;--text:#f0f0f2;--muted:#4a4a55;
  --danger:#ff4f4f;--warn:#ffaa00;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow:hidden}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── Sidebar ── */
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.logo span{color:var(--text)}
.sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.section-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:12px 16px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;margin:1px 8px;cursor:pointer;transition:background 0.1s;color:var(--muted);font-size:13px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:rgba(0,255,136,0.1);color:var(--accent)}
.nav-item .icon{width:20px;height:20px;border-radius:5px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.nav-item.active .icon{background:rgba(0,255,136,0.15)}
.nav-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .online-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);flex-shrink:0}
.nav-item .badge{background:var(--danger);color:#fff;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;flex-shrink:0}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border);flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--surface2)}
.avatar-sm{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0}
.user-name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:5px;font-size:13px;transition:color 0.15s}
.icon-btn:hover{color:var(--text)}

/* ── Chat header ── */
.chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg)}
.chat-header-name{font-weight:600;font-size:15px}
.chat-header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.header-actions{margin-left:auto;display:flex;gap:8px}
.hdr-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.15s}
.hdr-btn:hover{background:rgba(255,255,255,0.09);color:var(--text)}
.hdr-btn.danger:hover{background:rgba(255,79,79,0.12);color:var(--danger);border-color:rgba(255,79,79,0.3)}
.typing-bar{height:20px;padding:0 20px;font-size:11px;color:var(--muted);font-style:italic;flex-shrink:0}

/* ── Messages ── */
#chat-window{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:2px}
#chat-window::-webkit-scrollbar{width:5px}
#chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg-group{display:flex;gap:12px;padding:4px 0;animation:fadeUp 0.15s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-group .av{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;cursor:pointer}
.msg-group .body{flex:1;min-width:0}
.msg-group .meta{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.msg-group .sender-name{font-weight:600;font-size:13px;cursor:pointer}
.msg-group .sender-name:hover{text-decoration:underline}
.msg-group .time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.msg-group .text{font-size:14px;line-height:1.55;color:#d4d4d8;word-break:break-word}
.msg-group .text.mine{color:#e8e8ea}
.msg-group.me .sender-name{color:var(--accent)}
.msg-group .img-msg{max-width:320px;max-height:280px;border-radius:10px;margin-top:4px;cursor:pointer;display:block;border:1px solid var(--border)}
.system-msg{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding:8px 0;letter-spacing:0.04em}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.06em}

/* ── Input area ── */
.input-area{padding:12px 20px 16px;flex-shrink:0}
.input-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px 4px 4px 14px;display:flex;align-items:center;gap:6px;transition:border-color 0.15s}
.input-box:focus-within{border-color:rgba(0,255,136,0.3)}
.msg-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;padding:8px 0;resize:none;max-height:120px}
.msg-input::placeholder{color:var(--muted)}
.input-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.input-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:7px 9px;border-radius:8px;font-size:16px;transition:color 0.15s,background 0.15s;line-height:1}
.input-btn:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.send-btn{background:var(--accent);color:#000;border:none;border-radius:9px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.15s;white-space:nowrap}
.send-btn:hover{opacity:0.85}
.send-btn:disabled{opacity:0.3;cursor:not-allowed}
#file-input{display:none}

/* ── Panels (right side) ── */
.panel{width:220px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:14px 14px 10px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.panel-scroll{flex:1;overflow-y:auto;padding:8px}
.panel-scroll::-webkit-scrollbar{width:3px}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--border)}
.online-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;transition:background 0.1s}
.online-item:hover{background:rgba(255,255,255,0.05)}
.online-item .av-xs{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;flex-shrink:0}
.online-item .nm{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.online-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 4px var(--accent);flex-shrink:0}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;max-width:300px;animation:toastIn 0.2s ease-out;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.error{border-color:rgba(255,79,79,0.4);color:#ff7070}
.toast.success{border-color:rgba(0,255,136,0.3);color:#00ff88}
.toast.info{border-color:rgba(255,255,255,0.1);color:#aaa}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Context menu ── */
.ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:160px;z-index:500;box-shadow:0 16px 40px rgba(0,0,0,0.5);display:none}
.ctx-menu.open{display:block}
.ctx-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background 0.1s}
.ctx-item:hover{background:rgba(255,255,255,0.07)}
.ctx-item.danger{color:var(--danger)}
.ctx-item.danger:hover{background:rgba(255,79,79,0.1)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
.modal h3{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:16px}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px}
.modal input:focus{border-color:rgba(0,255,136,0.4)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
.modal-btn.cancel{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border)}
.modal-btn.confirm{background:var(--accent);color:#000}

/* ── Image lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:600;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:10px}

/* ── Pending badge on friends nav ── */
#pending-count{display:none}

/* ── Mobile ── */
@media(max-width:700px){
  .panel{display:none}
  .sidebar{width:200px}
}
@media(max-width:500px){
  .sidebar{display:none}
  .main{width:100%}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">cool<span>chat</span></div>
    </div>
    <div class="sidebar-scroll">
      <div class="section-label">Channels</div>
      <div class="nav-item active" id="nav-global" onclick="switchRoom('global')">
        <div class="icon">🌍</div>
        <span class="name">Global Chat</span>
      </div>

      <div class="section-label">Friends
        <span id="pending-count" class="badge" style="margin-left:6px;font-size:9px"></span>
      </div>
      <div class="nav-item" id="nav-friends" onclick="openModal('friends-modal')">
        <div class="icon">👥</div>
        <span class="name">Friends</span>
        <span id="pending-badge" class="badge" style="display:none"></span>
      </div>
      <div class="nav-item" onclick="openModal('add-friend-modal')">
        <div class="icon">➕</div>
        <span class="name">Add Friend</span>
      </div>

      <div class="section-label">Direct Messages</div>
      <div id="dm-list"></div>
    </div>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar-sm" id="my-avatar" style="background:rgba(0,255,136,0.15);color:#00ff88"></div>
        <span class="user-name">{{ username }}</span>
        {% if is_admin %}<a href="/admin" class="icon-btn" title="Admin Panel">⚡</a>{% endif %}
        <a href="/logout" class="icon-btn" title="Log out">⏻</a>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="chat-header">
      <div>
        <div class="chat-header-name" id="room-name">🌍 Global Chat</div>
        <div class="chat-header-sub" id="room-sub">Everyone can see this</div>
      </div>
      <div class="header-actions" id="dm-actions" style="display:none">
        <button class="hdr-btn danger" onclick="blockCurrentDm()">Block</button>
        <button class="hdr-btn danger" onclick="removeFriendCurrentDm()">Remove Friend</button>
      </div>
    </div>
    <div class="typing-bar" id="typing-bar"></div>
    <div id="chat-window">
      <div class="empty-chat" id="empty-msg">
        <span style="font-size:28px;opacity:0.3">💬</span>
        No messages yet — say hello!
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea class="msg-input" id="msg-input" placeholder="Message..." rows="1" maxlength="2000" disabled></textarea>
        <div class="input-actions">
          <button class="input-btn" title="Send image/GIF" onclick="document.getElementById('file-input').click()">📎</button>
          <button class="input-btn" id="emoji-btn" title="Emoji">😊</button>
          <button class="send-btn" id="send-btn" disabled>SEND</button>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/*,.gif">
    </div>
  </div>

  <!-- RIGHT PANEL: Online Users -->
  <div class="panel">
    <div class="panel-header">Online — <span id="online-count">0</span></div>
    <div class="panel-scroll" id="online-list"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" id="ctx-dm">💬 Message</div>
  <div class="ctx-item" id="ctx-add-friend">👥 Add Friend</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="ctx-block">🚫 Block</div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<!-- MODALS -->

<!-- Add Friend -->
<div class="modal-overlay" id="add-friend-modal">
  <div class="modal">
    <h3>Add Friend</h3>
    <input type="text" id="add-friend-input" placeholder="Enter their username...">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('add-friend-modal')">Cancel</button>
      <button class="modal-btn confirm" onclick="sendFriendReq()">Send Request</button>
    </div>
  </div>
</div>

<!-- Friends list -->
<div class="modal-overlay" id="friends-modal">
  <div class="modal" style="max-width:420px">
    <h3>Friends</h3>
    <div id="friends-modal-content" style="max-height:360px;overflow-y:auto"></div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="modal-btn cancel" onclick="closeModal('friends-modal')">Close</button>
    </div>
  </div>
</div>

<!-- Emoji picker (simple) -->
<div class="modal-overlay" id="emoji-modal">
  <div class="modal" style="max-width:340px">
    <h3>Pick Emoji</h3>
    <div id="emoji-grid" style="display:flex;flex-wrap:wrap;gap:6px;max-height:240px;overflow-y:auto;margin-bottom:12px"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('emoji-modal')">Close</button>
    </div>
  </div>
</div>

<script>
const ME = {{ username|tojson }};
const IS_ADMIN = {{ is_admin|tojson }};

// ── Colors ──────────────────────────────────────────────────────
const PALETTE = [
  ['rgba(0,255,136,0.15)','#00ff88'],['rgba(124,58,237,0.18)','#a78bfa'],
  ['rgba(251,191,36,0.15)','#fbbf24'],['rgba(248,113,113,0.15)','#f87171'],
  ['rgba(96,165,250,0.15)','#60a5fa'],['rgba(244,114,182,0.15)','#f472b6'],
  ['rgba(52,211,153,0.15)','#34d399'],['rgba(251,146,60,0.15)','#fb923c'],
];
function getColor(name){
  let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%1000;
  return PALETTE[Math.abs(h)%PALETTE.length];
}
function initials(name){ return name.slice(0,2).toUpperCase(); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ts(unix){ return new Date(unix*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function avatar(name,size='34px'){
  const [bg,col]=getColor(name);
  return `<div style="width:${size};height:${size};border-radius:8px;background:${bg};color:${col};display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0">${initials(name)}</div>`;
}

// Set my avatar
(()=>{ const [bg,col]=getColor(ME); const el=document.getElementById('my-avatar'); el.style.background=bg; el.style.color=col; el.textContent=initials(ME); })();

// ── State ────────────────────────────────────────────────────────
let currentRoom = 'global';
let friends = [], pending = [];
let dmList = [];
const seenMsgs = new Set();
let typingTimer = null;
let lastTypingEmit = 0;
let ctxTarget = null;

// ── Socket ───────────────────────────────────────────────────────
const socket = io();

socket.on('connect', ()=>{
  document.getElementById('msg-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
});
socket.on('disconnect', ()=>{
  document.getElementById('msg-input').disabled = true;
  document.getElementById('send-btn').disabled = true;
});

socket.on('msg', (d)=>{
  if(seenMsgs.has(d.id)) return;
  seenMsgs.add(d.id);
  if(d.room === currentRoom || (d.room === 'global' && currentRoom === 'global')){
    appendMsg(d);
  }
  // If DM and not open — show badge
  if(d.room !== 'global' && d.room !== currentRoom && d.sender !== ME){
    addOrUpdateDm(d.sender, true);
  }
  if(d.room === 'global' && d.sender !== ME && currentRoom !== 'global'){
    // could add unread dot here
  }
});

socket.on('online_users', (users)=>{
  renderOnline(users);
});

socket.on('friends_update', ({friends: f, pending: p})=>{
  friends = f; pending = p;
  updatePendingBadge();
  renderFriendsModal();
  // Update DM list with friends
  f.forEach(name=>{ if(!dmList.includes(name)) addOrUpdateDm(name, false); });
});

socket.on('toast', ({msg, cls})=>{ showToast(msg, cls); });

socket.on('clear_chat', ()=>{
  if(currentRoom==='global') clearMessages();
});

socket.on('user_typing', ({user, room})=>{
  if(room !== currentRoom && !(room==='global' && currentRoom==='global')) return;
  const bar = document.getElementById('typing-bar');
  bar.textContent = `${user} is typing...`;
  clearTimeout(typingTimer);
  typingTimer = setTimeout(()=>{ bar.textContent=''; }, 2500);
});

socket.on('force_logout', ()=>{ window.location.href='/logout'; });

// ── Messages ─────────────────────────────────────────────────────
const chatWindow = document.getElementById('chat-window');

function clearMessages(){
  chatWindow.innerHTML = '<div class="empty-chat" id="empty-msg"><span style="font-size:28px;opacity:0.3">💬</span>Chat was cleared.</div>';
  seenMsgs.clear();
}

function removeEmpty(){
  const e = document.getElementById('empty-msg');
  if(e) e.remove();
}

function appendMsg(d){
  removeEmpty();
  const isMe = d.sender === ME;
  const [bg,col] = getColor(d.sender);
  const div = document.createElement('div');
  div.className = 'msg-group' + (isMe ? ' me' : '');
  div.dataset.id = d.id;

  let contentHtml = '';
  if(d.type === 'image'){
    contentHtml = `<img src="${esc(d.content)}" class="img-msg" onclick="openLightbox('${esc(d.content)}')" alt="image">`;
  } else {
    contentHtml = `<div class="text${isMe?' mine':''}">${esc(d.content)}</div>`;
  }

  div.innerHTML = `
    <div class="av" style="background:${bg};color:${col}" onclick="showCtx(event,'${esc(d.sender)}')">${initials(d.sender)}</div>
    <div class="body">
      <div class="meta">
        <span class="sender-name" style="color:${col}" onclick="showCtx(event,'${esc(d.sender)}')">${esc(d.sender)}</span>
        <span class="time">${ts(d.ts)}</span>
      </div>
      ${contentHtml}
    </div>`;
  chatWindow.appendChild(div);

  // Limit to 150 msgs
  const msgs = chatWindow.querySelectorAll('.msg-group');
  if(msgs.length > 150) msgs[0].remove();
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

// ── Room switching ────────────────────────────────────────────────
function switchRoom(room){
  currentRoom = room;
  chatWindow.innerHTML = '<div class="empty-chat" id="empty-msg"><span style="font-size:28px;opacity:0.3">💬</span>Loading...</div>';
  seenMsgs.clear();

  // Update header
  const nameEl = document.getElementById('room-name');
  const subEl = document.getElementById('room-sub');
  const dmActions = document.getElementById('dm-actions');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  if(room === 'global'){
    nameEl.textContent = '🌍 Global Chat';
    subEl.textContent = 'Everyone can see this';
    dmActions.style.display = 'none';
    document.getElementById('nav-global').classList.add('active');
    document.getElementById('msg-input').placeholder = 'Message everyone...';
    // History already loaded on connect - reload
    socket.emit('open_dm', {target: '__global_reload__'}); // won't match
    // Re-request global - just reconnect to global room
  } else {
    nameEl.textContent = '💬 ' + room;
    subEl.textContent = 'Direct message';
    dmActions.style.display = 'flex';
    document.getElementById('msg-input').placeholder = `Message ${room}...`;
    socket.emit('open_dm', {target: room});
    // clear unread badge
    document.querySelectorAll('.dm-nav').forEach(el=>{
      if(el.dataset.user === room){
        el.classList.add('active');
        const b = el.querySelector('.badge');
        if(b) b.style.display='none';
      }
    });
  }
  document.getElementById('msg-input').focus();
}

// ── DM list ──────────────────────────────────────────────────────
function addOrUpdateDm(name, unread){
  const dmListEl = document.getElementById('dm-list');
  let existing = dmListEl.querySelector(`[data-user="${CSS.escape(name)}"]`);
  if(!existing){
    dmList.push(name);
    const [bg,col]=getColor(name);
    const item = document.createElement('div');
    item.className = 'nav-item dm-nav';
    item.dataset.user = name;
    item.onclick = ()=>switchRoom(name);
    item.innerHTML = `
      <div class="icon" style="background:${bg};color:${col};font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700">${initials(name)}</div>
      <span class="name">${esc(name)}</span>
      <span class="badge" style="display:${unread?'inline-block':'none'}">●</span>`;
    dmListEl.appendChild(item);
  } else if(unread){
    const b = existing.querySelector('.badge');
    if(b && existing.dataset.user !== currentRoom) b.style.display='inline-block';
  }
}

// ── Online panel ─────────────────────────────────────────────────
function renderOnline(users){
  const list = document.getElementById('online-list');
  document.getElementById('online-count').textContent = users.length;
  list.innerHTML = '';
  users.forEach(name=>{
    const [bg,col]=getColor(name);
    const item = document.createElement('div');
    item.className = 'online-item';
    item.onclick = (e)=>showCtx(e, name);
    item.innerHTML = `
      <div class="av-xs" style="background:${bg};color:${col}">${initials(name)}</div>
      <span class="nm">${esc(name)}</span>
      <div class="dot"></div>`;
    list.appendChild(item);
  });
}

// ── Send message ─────────────────────────────────────────────────
function sendMsg(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  socket.emit('send_msg', {content: text, type: 'text', room: currentRoom});
  input.value = '';
  input.style.height = 'auto';
}

document.getElementById('send-btn').addEventListener('click', sendMsg);
document.getElementById('msg-input').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); return; }
  const now = Date.now();
  if(now - lastTypingEmit > 1500){
    socket.emit('typing', {room: currentRoom});
    lastTypingEmit = now;
  }
});
document.getElementById('msg-input').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── File upload ──────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 3_000_000){ showToast('File too large! Max 2MB.', 'error'); return; }
  const reader = new FileReader();
  reader.onload = ev=>{
    socket.emit('send_msg', {content: ev.target.result, type: 'image', room: currentRoom});
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ── Friends ──────────────────────────────────────────────────────
function updatePendingBadge(){
  const b = document.getElementById('pending-badge');
  if(pending.length > 0){
    b.style.display = 'inline-block';
    b.textContent = pending.length;
  } else {
    b.style.display = 'none';
  }
}

function renderFriendsModal(){
  const el = document.getElementById('friends-modal-content');
  let html = '';

  if(pending.length){
    html += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#ffaa00;margin-bottom:10px">Pending Requests</div>`;
    pending.forEach(name=>{
      const [bg,col]=getColor(name);
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,170,0,0.05);border:1px solid rgba(255,170,0,0.15);border-radius:9px;margin-bottom:8px">
        <div style="width:28px;height:28px;border-radius:6px;background:${bg};color:${col};display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700">${initials(name)}</div>
        <span style="flex:1;font-size:13px">${esc(name)}</span>
        <button onclick="acceptFriend('${esc(name)}')" style="background:rgba(0,255,136,0.12);color:#00ff88;border:1px solid rgba(0,255,136,0.25);border-radius:6px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;cursor:pointer">✓ Accept</button>
        <button onclick="declineFriend('${esc(name)}')" style="background:rgba(255,79,79,0.1);color:#ff6060;border:1px solid rgba(255,79,79,0.2);border-radius:6px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;cursor:pointer">✕</button>
      </div>`;
    });
  }

  if(friends.length){
    html += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:12px 0 8px">Friends (${friends.length})</div>`;
    friends.forEach(name=>{
      const [bg,col]=getColor(name);
      const isOnline = document.querySelector(`#online-list .nm`) ? [...document.querySelectorAll('#online-list .nm')].some(e=>e.textContent===name) : false;
      html += `<div style="display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:background 0.1s" onmouseenter="this.style.background='rgba(255,255,255,0.04)'" onmouseleave="this.style.background=''"
        onclick="closeModal('friends-modal');switchRoom('${esc(name)}')">
        <div style="width:28px;height:28px;border-radius:6px;background:${bg};color:${col};display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700">${initials(name)}</div>
        <span style="flex:1;font-size:13px">${esc(name)}</span>
        <button onclick="event.stopPropagation();removeFriend('${esc(name)}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 6px" title="Remove">✕</button>
      </div>`;
    });
  }

  if(!friends.length && !pending.length){
    html = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:20px">No friends yet — add some!</p>';
  }
  el.innerHTML = html;
}

function sendFriendReq(){
  const val = document.getElementById('add-friend-input').value.trim();
  if(!val) return;
  socket.emit('add_friend', {target: val});
  document.getElementById('add-friend-input').value = '';
  closeModal('add-friend-modal');
}

function acceptFriend(name){ socket.emit('accept_friend', {from: name}); renderFriendsModal(); }
function declineFriend(name){ socket.emit('decline_friend', {from: name}); renderFriendsModal(); }
function removeFriend(name){ socket.emit('remove_friend', {target: name}); }

function blockCurrentDm(){ if(currentRoom!=='global'){ socket.emit('block_user',{target:currentRoom}); switchRoom('global'); } }
function removeFriendCurrentDm(){ if(currentRoom!=='global'){ socket.emit('remove_friend',{target:currentRoom}); } }

// ── Context menu ─────────────────────────────────────────────────
const ctxMenu = document.getElementById('ctx-menu');
function showCtx(e, name){
  e.preventDefault(); e.stopPropagation();
  if(name === ME) return;
  ctxTarget = name;
  ctxMenu.classList.add('open');
  ctxMenu.style.left = Math.min(e.clientX, window.innerWidth-180) + 'px';
  ctxMenu.style.top = Math.min(e.clientY, window.innerHeight-160) + 'px';
}
document.addEventListener('click', ()=>ctxMenu.classList.remove('open'));
document.getElementById('ctx-dm').onclick = ()=>{ if(ctxTarget){ addOrUpdateDm(ctxTarget,false); switchRoom(ctxTarget); } };
document.getElementById('ctx-add-friend').onclick = ()=>{ if(ctxTarget) socket.emit('add_friend',{target:ctxTarget}); };
document.getElementById('ctx-block').onclick = ()=>{ if(ctxTarget){ socket.emit('block_user',{target:ctxTarget}); ctxTarget=null; } };

// ── Emoji ─────────────────────────────────────────────────────────
const EMOJIS = ['😀','😂','🥰','😎','🤔','😅','🔥','💯','👀','💀','🎉','✅','❌','👍','👎','🙏','💪','🤝','❤️','💚','⭐','🚀','💬','🌍','😤','🫡','💅','🤡','😭','🥹','👏','🫶'];
(()=>{
  const grid = document.getElementById('emoji-grid');
  EMOJIS.forEach(em=>{
    const btn = document.createElement('button');
    btn.textContent = em;
    btn.style.cssText = 'background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:18px;cursor:pointer;transition:background 0.1s';
    btn.onmouseenter=()=>btn.style.background='rgba(255,255,255,0.12)';
    btn.onmouseleave=()=>btn.style.background='rgba(255,255,255,0.05)';
    btn.onclick=()=>{
      const inp=document.getElementById('msg-input');
      inp.value+=em; inp.focus();
      closeModal('emoji-modal');
    };
    grid.appendChild(btn);
  });
})();
document.getElementById('emoji-btn').onclick=()=>openModal('emoji-modal');

// ── Modals ────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) m.classList.remove('open'); });
});
document.getElementById('add-friend-input').addEventListener('keydown', e=>{ if(e.key==='Enter') sendFriendReq(); });

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(src){ document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); }

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg, cls='info'){
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast ' + cls;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3500);
}

// On load - request global history fresh
socket.emit('open_dm', {target: '_none_'});
</script>
</body>
