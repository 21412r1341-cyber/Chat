<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoolChat — Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0b;--card:#111113;--border:#222226;--accent:#00ff88;--accent2:#7c3aed;--text:#f0f0f2;--muted:#555560}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,255,136,0.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(124,58,237,0.05) 0%,transparent 60%);pointer-events:none}
.card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
.logo{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-0.02em;margin-bottom:6px}
.logo span{color:var(--text)}
.sub{font-size:13px;color:var(--muted);margin-bottom:32px}
label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
input{width:100%;background:#0a0a0b;border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:20px;transition:border-color 0.15s}
input:focus{border-color:rgba(0,255,136,0.4)}
.btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:9px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:opacity 0.15s,transform 0.1s}
.btn:hover{opacity:0.88}
.btn:active{transform:scale(0.98)}
.error{background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.25);border-radius:9px;padding:10px 14px;font-size:13px;color:#ff6060;margin-bottom:20px}
.footer{text-align:center;margin-top:22px;font-size:13px;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">cool<span>chat</span></div>
  <p class="sub">Sign in to your account</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="your username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    <button class="btn" type="submit">LOG IN →</button>
  </form>
  <div class="footer">No account? <a href="/register">Register here</a></div>
</div>
</body>
</html>
